<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Nayi Disha Foundation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="bg-light">
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="card shadow-lg" style="width: 100%; max-width: 400px;">
            <div class="card-body p-5">
              <div class="text-center mb-4">
                <i class="bi bi-heart-pulse-fill text-success" style="font-size: 3rem;"></i>
                <h3 class="fw-bold text-success mt-2">Admin Login</h3>
                <p class="text-muted">Nayi Disha Foundation</p>
              </div>
              <form id="adminLoginForm">
                <div class="mb-3">
                  <label for="username" class="form-label fw-bold">Username</label>
                  <input type="text" class="form-control" id="username" value="admin" required>
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label fw-bold">Password</label>
                  <input type="password" class="form-control" id="password" value="admin123" required>
                </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberAdmin">
                        <label class="form-check-label" for="rememberAdmin">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">Sign In</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
