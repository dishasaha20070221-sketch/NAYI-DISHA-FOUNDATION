<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Analytics - Nayi Disha Foundation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="bg-dark text-white border-end" id="sidebar-wrapper">
            <div class="sidebar-heading d-flex align-items-center px-4 py-4">
                <i class="bi bi-heart-pulse-fill text-success fs-3 me-2"></i>
                <span class="fw-bold fs-5">Nayi Disha Admin</span>
            </div>
            <div class="list-group list-group-flush">
                <a href="index.html" class="list-group-item list-group-item-action bg-dark text-white"><i class="bi bi-house-door me-2"></i> Dashboard</a>
                <a href="donations.html" class="list-group-item list-group-item-action bg-dark text-white"><i class="bi bi-cash-stack me-2"></i> Manage Donations</a>
                <a href="volunteers.html" class="list-group-item list-group-item-action bg-dark text-white"><i class="bi bi-people me-2"></i> Manage Volunteers</a>
                <a href="events.html" class="list-group-item list-group-item-action bg-dark text-white"><i class="bi bi-calendar-event me-2"></i> Manage Events</a>
                <a href="users.html" class="list-group-item list-group-item-action bg-dark text-white"><i class="bi bi-person-badge me-2"></i> Manage Users</a>
                <a href="reports.html" class="list-group-item list-group-item-action bg-dark text-white active"><i class="bi bi-bar-chart-line me-2"></i> Reports & Analytics</a>
                <a href="../index.html" class="list-group-item list-group-item-action bg-dark text-white mt-4"><i class="bi bi-arrow-left me-2"></i> Back to Website</a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <!-- Top Navigation -->
            <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
                <div class="container-fluid">
                    <div class="d-flex align-items-center">
                        <button class="btn btn-outline-secondary me-3" id="menu-toggle">
                            <i class="bi bi-list"></i>
                        </button>
                        <h5 class="fw-bold mb-0">Reports & Analytics</h5>
                    </div>
                    <div class="d-flex align-items-center ms-auto">
                        <span class="me-3 text-muted">Welcome, Admin</span>
                        <div class="dropdown">
                            <button class="btn btn-outline-secondary" type="button" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle fs-4"></i>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="login.html"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="container-fluid py-4" id="reportsContainer">
                <!-- Reports Summary -->
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card h-100 border-0 shadow-sm">
                            <div class="card-body">
                                <h6 class="text-muted mb-1">Total Donations</h6>
                                <h3 class="fw-bold text-success" id="reportTotalDonations">4</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card h-100 border-0 shadow-sm">
                            <div class="card-body">
                                <h6 class="text-muted mb-1">Total Amount</h6>
                                <h3 class="fw-bold text-primary" id="reportTotalAmount">₹43,000</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
